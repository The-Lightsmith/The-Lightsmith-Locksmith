  <script>
  (function(){
    const viewport = document.querySelector('.carousel-viewport');
    const track = document.getElementById('reviewsList');
    if (!viewport || !track) return;

    const STAR_FULL = '&#9733;';
    const STAR_EMPTY = '&#9734;';
    const FALLBACK_REVIEWS = [
      {
        authorAttribution: { displayName: 'Aaron M.', uri: 'https://g.page/r/CWJUL5k6yNeKEAE/review' },
        rating: 5,
        text: { text: 'Phenomenal work! Lights look brand new and Jack was right on time.' },
        createTime: '2024-10-01T00:00:00Z'
      },
      {
        authorAttribution: { displayName: 'Katie S.', uri: 'https://g.page/r/CWJUL5k6yNeKEAE/review' },
        rating: 5,
        text: { text: 'Booking was easy, the results were incredible, and the five year warranty is a bonus.' },
        createTime: '2024-08-18T00:00:00Z'
      },
      {
        authorAttribution: { displayName: 'Luis R.', uri: 'https://g.page/r/CWJUL5k6yNeKEAE/review' },
        rating: 5,
        text: { text: 'Night visibility improved immediately. Highly recommend The Lightsmith.' },
        createTime: '2024-07-11T00:00:00Z'
      }
    ];

    function escapeHTML(str) {
      return String(str || '').replace(/[&<>"']/g, function(match){
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[match];
      });
    }

    function renderStars(rating) {
      const r = Math.round(Math.max(0, Math.min(5, Number(rating) || 0)));
      return '<span class="stars" aria-label="' + r + ' out of 5">' + STAR_FULL.repeat(r) + STAR_EMPTY.repeat(5 - r) + '</span>';
    }

    function renderCard(review) {
      const name = escapeHTML(review.authorAttribution && review.authorAttribution.displayName || 'Google user');
      const profileUrl = review.authorAttribution && review.authorAttribution.uri ? review.authorAttribution.uri : '#';
      const profilePhoto = review.authorAttribution && review.authorAttribution.photoUri || '';
      const text = escapeHTML(review.text && (review.text.text || review.text) || '');
      const dateSource = review.createTime || review.publishTime || '';
      const date = dateSource ? new Date(dateSource).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' }) : '';
      const rating = review.rating || 0;
      return [
        '<article class="review-card">',
        '  <header class="review-head">',
        profilePhoto ? '    <img class="review-avatar" src="' + profilePhoto + '" alt="" loading="lazy">' : '',
        '    <div>',
        '      <a class="review-author" href="' + profileUrl + '" target="_blank" rel="noopener">' + name + '</a>',
        '      <div class="review-meta">' + renderStars(rating) + (date ? ' <span class="review-date">' + date + '</span>' : '') + '</div>',
        '    </div>',
        '  </header>',
        '  <p class="review-text">' + text + '</p>',
        '</article>'
      ].join('\n');
    }

    // Marquee state
    const SPEED = 0.04;    // px per ms base scroll speed
    let offset = 0;
    let userVelocity = 0;  // extra px per ms from user input, decays over time
    let halfWidth = 0;
    let lastTimestamp = null;
    let raf = null;

    function step(timestamp) {
      if (lastTimestamp === null) lastTimestamp = timestamp;
      const dt = Math.min(timestamp - lastTimestamp, 50);
      lastTimestamp = timestamp;

      // Decay user-added velocity
      userVelocity *= Math.pow(0.88, dt / 16.67);
if (Math.abs(userVelocity) < 0.001) userVelocity = 0;

      offset += (SPEED + userVelocity) * dt;
      if (halfWidth > 0) {
  offset = ((offset % halfWidth) + halfWidth) % halfWidth;
}
      track.style.transform = 'translateX(' + (-offset) + 'px)';
      raf = requestAnimationFrame(step);
    }

    // Detect Safari / iOS — use static display instead of JS marquee
    const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent)
                  || /iPad|iPhone|iPod/.test(navigator.userAgent)
                  || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

    function startMarquee(reviews) {
      if (isSafari) {
        const carousel = document.getElementById('reviewsCarousel');
        carousel.classList.add('safari-reviews');
        track.innerHTML = reviews.map(renderCard).join('');

        let idx = 0;
        const cards = Array.from(track.querySelectorAll('.review-card'));
        function showCard(i, dir) {
          cards.forEach(function(c, n) {
            c.classList.remove('active', 'dir-prev');
            if (n === i) {
              c.classList.add('active');
              if (dir === 'prev') c.classList.add('dir-prev');
            }
          });
        }
        showCard(0);

        // Auto-cycle every 3 seconds (forward direction)
        function makeTimer() {
          return setInterval(function() {
            idx = (idx + 1) % cards.length;
            showCard(idx, 'next');
          }, 3000);
        }
        let timer = makeTimer();

        // Swipe to navigate
        let touchStartX = null;
        viewport.addEventListener('touchstart', function(e) {
          touchStartX = e.touches[0].clientX;
          clearInterval(timer);
        }, { passive: true });
        viewport.addEventListener('touchend', function(e) {
          if (touchStartX === null) return;
          const dx = e.changedTouches[0].clientX - touchStartX;
          if (Math.abs(dx) > 40) {
            var dir = dx < 0 ? 'next' : 'prev';
            idx = dir === 'next'
              ? (idx + 1) % cards.length
              : (idx - 1 + cards.length) % cards.length;
            showCard(idx, dir);
          }
          touchStartX = null;
          timer = makeTimer();
        }, { passive: true });

        return;
      }
      // Desktop marquee
      const doubled = reviews.concat(reviews);
      track.innerHTML = doubled.map(renderCard).join('');
      // Measure after paint so layout is complete
      requestAnimationFrame(function(){
        halfWidth = track.scrollWidth / 2;
        lastTimestamp = null;
        if (raf) cancelAnimationFrame(raf);
        raf = requestAnimationFrame(step);
      });
    }

    if (!isSafari) {
      // Wheel: horizontal or vertical scroll boosts velocity
      viewport.addEventListener('wheel', function(e) {
        e.preventDefault();
        const delta = Math.abs(e.deltaX) > Math.abs(e.deltaY) ? e.deltaX : e.deltaY * 0.5;
        userVelocity += delta * 0.06;
      }, { passive: false });

      // Touch swipe
      let lastTouchX = null;
      viewport.addEventListener('touchstart', function(e) {
        lastTouchX = e.touches[0].clientX;
      }, { passive: true });
      viewport.addEventListener('touchmove', function(e) {
        if (lastTouchX === null) return;
        const dx = lastTouchX - e.touches[0].clientX;
        userVelocity += dx * 0.04;
        lastTouchX = e.touches[0].clientX;
      }, { passive: true });
      viewport.addEventListener('touchend', function() { lastTouchX = null; }, { passive: true });
    }

    async function fetchReviews() {
      const keyMeta = document.querySelector('meta[name="google-places-api-key"]');
      const placeMeta = document.querySelector('meta[name="google-places-place-id"]');
      const key = keyMeta ? keyMeta.content.trim() : '';
      const place = placeMeta ? placeMeta.content.trim() : '';
      if (!key || !place) {
        console.warn('Google Places credentials missing. Falling back to sample reviews.');
        return FALLBACK_REVIEWS;
      }
      const fieldMask = ['reviews.authorAttribution','reviews.rating','reviews.text','reviews.publishTime'].join(',');
      const endpoint = 'https://places.googleapis.com/v1/places/' + encodeURIComponent(place);
      const res = await fetch(endpoint, {
        headers: {
          'X-Goog-Api-Key': key,
          'X-Goog-FieldMask': fieldMask
        }
      });
      if (!res.ok) throw new Error('Places API error ' + res.status);
      const data = await res.json();
      const reviews = Array.isArray(data.reviews) ? data.reviews : [];
      reviews.forEach(function(r){ if (!r.createTime && r.publishTime) r.createTime = r.publishTime; });
      return reviews.length ? reviews : FALLBACK_REVIEWS;
    }

    (async function init(){
      let reviews;
      try {
        reviews = await fetchReviews();
      } catch (error) {
        console.warn('Falling back to sample reviews:', error.message || error);
        reviews = FALLBACK_REVIEWS;
      }
      startMarquee(reviews);
    })();
  })();
  </script>
