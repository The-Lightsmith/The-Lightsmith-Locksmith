  <script>
  (function(){
    const ratingSelect = document.getElementById('ratingFilter');
    const searchInput = document.getElementById('searchFilter');
    const carousel = document.getElementById('reviewsCarousel');
    const track = document.getElementById('reviewsList');
    if (!ratingSelect || !searchInput || !carousel || !track) return;

    const prevBtn = carousel.querySelector('.carousel-arrow.prev');
    const nextBtn = carousel.querySelector('.carousel-arrow.next');
    const STAR_FULL = '&#9733;';
    const STAR_EMPTY = '&#9734;';
    const FALLBACK_REVIEWS = [
      {
        authorAttribution: { displayName: 'Aaron M.', uri: 'https://g.page/r/CWJUL5k6yNeKEAE/review' },
        rating: 5,
        text: { text: 'Phenomenal work! Lights look brand new and Jack was right on time.' },
        createTime: '2024-10-01T00:00:00Z'
      },
      {
        authorAttribution: { displayName: 'Katie S.', uri: 'https://g.page/r/CWJUL5k6yNeKEAE/review' },
        rating: 5,
        text: { text: 'Booking was easy, the results were incredible, and the five year warranty is a bonus.' },
        createTime: '2024-08-18T00:00:00Z'
      },
      {
        authorAttribution: { displayName: 'Luis R.', uri: 'https://g.page/r/CWJUL5k6yNeKEAE/review' },
        rating: 5,
        text: { text: 'Night visibility improved immediately. Highly recommend The Lightsmith.' },
        createTime: '2024-07-11T00:00:00Z'
      }
    ];

    let allReviews = [];
    let filtered = [];
    let currentIndex = 0;
    let autoTimer = null;

    function escapeHTML(str) {
      return String(str || '').replace(/[&<>"']/g, function(match){
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[match];
      });
    }

    function renderStars(rating) {
      const r = Math.round(Math.max(0, Math.min(5, Number(rating) || 0)));
      return '<span class="stars" aria-label="' + r + ' out of 5">' + STAR_FULL.repeat(r) + STAR_EMPTY.repeat(5 - r) + '</span>';
    }

    function renderCard(review) {
      const name = escapeHTML(review.authorAttribution && review.authorAttribution.displayName || 'Google user');
      const profileUrl = review.authorAttribution && review.authorAttribution.uri ? review.authorAttribution.uri : '#';
      const profilePhoto = review.authorAttribution && review.authorAttribution.photoUri || '';
      const text = escapeHTML(review.text && (review.text.text || review.text) || '');
      const dateSource = review.createTime || review.publishTime || '';
      const date = dateSource ? new Date(dateSource).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' }) : '';
      const rating = review.rating || 0;
       return [
        '<article class="review-card review-slide">',
        '  <header class="review-head">',
        profilePhoto ? '    <img class="review-avatar" src="' + profilePhoto + '" alt="" loading="lazy">' : '',
        '    <div>',
        '      <a class="review-author" href="' + profileUrl + '" target="_blank" rel="noopener">' + name + '</a>',
        '      <div class="review-meta">' + renderStars(rating) + (date ? ' <span class="review-date">' + date + '</span>' : '') + '</div>',
        '    </div>',
        '  </header>',
        '  <p class="review-text">' + text + '</p>',
        '  <div class="review-actions" aria-hidden="false">',
        '    <button class="card-arrow card-arrow--prev" type="button" aria-label="Show previous review">&#10094;</button>',
        '    <button class="card-arrow card-arrow--next" type="button" aria-label="Show next review">&#10095;</button>',
        '  </div>',
        '</article>'
      ].join('\n');
    }

    function applyFilters() {
      const minRating = Number(ratingSelect.value || 0);
      const term = searchInput.value.trim().toLowerCase();
      filtered = allReviews.filter(function(review){
        const rating = Number(review.rating || 0);
        const text = ((review.text && (review.text.text || review.text)) || '') + ' ' + (review.authorAttribution && review.authorAttribution.displayName || '');
        return rating >= minRating && (!term || text.toLowerCase().indexOf(term) !== -1);
      });
      currentIndex = 0;
    }

    function renderCarousel() {
      const count = filtered.length;
      if (!count) {
        track.innerHTML = '<p class="muted">No reviews match your filters yet.</p>';
        return;
      }
      const indices = [];
      if (count >= 3) {
        indices.push((currentIndex - 1 + count) % count, currentIndex % count, (currentIndex + 1) % count);
      } else if (count === 2) {
        indices.push(currentIndex % 2, (currentIndex + 1) % 2);
      } else {
        indices.push(0);
      }
       const html = indices.map(function(idx, position){
        const slideHTML = renderCard(filtered[idx]);
        const cls = count >= 3 ? (position === 1 ? 'is-center' : (position === 0 ? 'is-side is-left' : 'is-side is-right')) : (position === 0 ? 'is-center' : 'is-side');
        return slideHTML.replace('review-slide', 'review-slide ' + cls);
      }).join('');
      track.innerHTML = html;
      // Hook up internal mobile buttons after render
      track.querySelectorAll('.card-arrow--prev').forEach(function(btn){
        btn.addEventListener('click', function(){ prev(); startAuto(); });
      });
      track.querySelectorAll('.card-arrow--next').forEach(function(btn){
        btn.addEventListener('click', function(){ next(); startAuto(); });
      });
    }
    function next() {
      if (!filtered.length) return;
      currentIndex = (currentIndex + 1) % filtered.length;
      renderCarousel();
    }

    function prev() {
      if (!filtered.length) return;
      currentIndex = (currentIndex - 1 + filtered.length) % filtered.length;
      renderCarousel();
    }

    function startAuto() {
      stopAuto();
      autoTimer = setInterval(next, 6000);
    }

    function stopAuto() {
      if (autoTimer) {
        clearInterval(autoTimer);
        autoTimer = null;
      }
    }

    async function fetchReviews() {
      const keyMeta = document.querySelector('meta[name="google-places-api-key"]');
      const placeMeta = document.querySelector('meta[name="google-places-place-id"]');
      const key = keyMeta ? keyMeta.content.trim() : '';
      const place = placeMeta ? placeMeta.content.trim() : '';
      if (!key || !place) {
        console.warn('Google Places credentials missing. Falling back to sample reviews.');
        return FALLBACK_REVIEWS;
      }
      const fieldMask = ['reviews.authorAttribution','reviews.rating','reviews.text','reviews.publishTime','reviews.createTime'].join(',');
      const endpoint = 'https://places.googleapis.com/v1/places/' + encodeURIComponent(place);
      const res = await fetch(endpoint, {
        headers: {
          'X-Goog-Api-Key': key,
          'X-Goog-FieldMask': fieldMask
        }
      });
      if (!res.ok) {
        throw new Error('Places API error ' + res.status);
      }
      const data = await res.json();
      const reviews = Array.isArray(data.reviews) ? data.reviews : [];
      reviews.forEach(function(review){
        if (!review.createTime && review.publishTime) {
          review.createTime = review.publishTime;
        }
      });
      return reviews.length ? reviews : FALLBACK_REVIEWS;
    }

    (async function init(){
      try {
        allReviews = await fetchReviews();
      } catch (error) {
        console.warn('Falling back to sample reviews:', error.message || error);
        allReviews = FALLBACK_REVIEWS;
      }
      applyFilters();
      renderCarousel();
      startAuto();

      ratingSelect.addEventListener('change', function(){ applyFilters(); renderCarousel(); startAuto(); });
      searchInput.addEventListener('input', function(){ applyFilters(); renderCarousel(); });
      prevBtn.addEventListener('click', function(){ prev(); startAuto(); });
      nextBtn.addEventListener('click', function(){ next(); startAuto(); });
      carousel.addEventListener('mouseenter', stopAuto);
      carousel.addEventListener('mouseleave', startAuto);

      carousel.addEventListener('keydown', function(event){
        if (event.key === 'ArrowLeft') { event.preventDefault(); prev(); startAuto(); }
        if (event.key === 'ArrowRight') { event.preventDefault(); next(); startAuto(); }
      });
    })();
  })();
  </script>
